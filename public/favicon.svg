<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Same palette as Logo + brandGradient (conic approximated for SVG) -->
    <linearGradient id="vt-ring" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4C6EF5" />
      <stop offset="35%" stop-color="#6B21A8" />
      <stop offset="70%" stop-color="#BE185D" />
      <stop offset="100%" stop-color="#4C6EF5" />
    </linearGradient>
  </defs>
  <!-- Circular mark: gradient ring + inset navy disc only (same structure as Logo with innerWordmark off) -->
  <circle cx="24" cy="24" r="24" fill="url(#vt-ring)" />
  <circle
    cx="24"
    cy="24"
    r="22"
    fill="rgba(10, 13, 46, 0.94)"
    stroke="rgba(255, 255, 255, 0.1)"
    stroke-width="0.35"
  />
</svg>
